name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Lambda
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test -race ./...

      - name: Build & zip API
        run: make zip-api

      - name: Build & zip Telegram bot
        run: make zip-telegram

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # ── Migrations ANTES do deploy (schema deve ser retrocompatível) ──────────
      - name: Install Tern
        run: go install github.com/jackc/tern/v2@latest

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: make migrate-up

      # ── Deploy Lambdas (cria se não existir, atualiza se existir) ─────────────
      - name: Deploy API Lambda
        env:
          LAMBDA_NAME: ${{ vars.LAMBDA_API_NAME }}
          LAMBDA_ROLE_ARN: ${{ vars.LAMBDA_API_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          if aws lambda get-function --function-name "$LAMBDA_NAME" --region "$AWS_REGION" > /dev/null 2>&1; then
            echo "→ Atualizando Lambda API..."
            aws lambda update-function-code \
              --function-name "$LAMBDA_NAME" \
              --zip-file fileb://lambda-api.zip \
              --region "$AWS_REGION"
          else
            echo "→ Criando Lambda API..."
            aws lambda create-function \
              --function-name "$LAMBDA_NAME" \
              --runtime provided.al2023 \
              --role "$LAMBDA_ROLE_ARN" \
              --handler bootstrap \
              --zip-file fileb://lambda-api.zip \
              --region "$AWS_REGION"
          fi

      - name: Deploy Telegram Lambda
        env:
          LAMBDA_NAME: ${{ vars.LAMBDA_TELEGRAM_NAME }}
          LAMBDA_ROLE_ARN: ${{ vars.LAMBDA_TELEGRAM_ROLE_ARN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          if aws lambda get-function --function-name "$LAMBDA_NAME" --region "$AWS_REGION" > /dev/null 2>&1; then
            echo "→ Atualizando Lambda Telegram..."
            aws lambda update-function-code \
              --function-name "$LAMBDA_NAME" \
              --zip-file fileb://lambda-telegram.zip \
              --region "$AWS_REGION"
          else
            echo "→ Criando Lambda Telegram..."
            aws lambda create-function \
              --function-name "$LAMBDA_NAME" \
              --runtime provided.al2023 \
              --role "$LAMBDA_ROLE_ARN" \
              --handler bootstrap \
              --zip-file fileb://lambda-telegram.zip \
              --region "$AWS_REGION"
          fi

      - name: Wait for API Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ vars.LAMBDA_API_NAME }} \
            --region ${{ vars.AWS_REGION }}

      - name: Wait for Telegram Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ vars.LAMBDA_TELEGRAM_NAME }} \
            --region ${{ vars.AWS_REGION }}

      # ── Permissão: API Gateway pode invocar a Lambda ───────────────────────────
      - name: Grant API Gateway permission to invoke Lambda
        env:
          LAMBDA_NAME: ${{ vars.LAMBDA_API_NAME }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          API_GATEWAY_ID: ${{ vars.API_GATEWAY_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws lambda add-permission \
            --function-name "$LAMBDA_NAME" \
            --statement-id apigw-invoke \
            --action lambda:InvokeFunction \
            --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:$AWS_REGION:$AWS_ACCOUNT_ID:$API_GATEWAY_ID/*/*" \
            --region "$AWS_REGION" \
          || echo "→ Permissão já existe, continuando."

      # ── Deployment no API Gateway (ativa as mudanças no stage) ────────────────
      - name: Deploy API Gateway stage
        env:
          API_GATEWAY_ID: ${{ vars.API_GATEWAY_ID }}
          API_GATEWAY_STAGE: ${{ vars.API_GATEWAY_STAGE }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws apigateway create-deployment \
            --rest-api-id "$API_GATEWAY_ID" \
            --stage-name "$API_GATEWAY_STAGE" \
            --region "$AWS_REGION"
          echo "→ Deployment criado no stage $API_GATEWAY_STAGE"

      # ── Health check ──────────────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 15
          curl --fail --silent --show-error https://api.kodify.com.br/api/v1/health \
            && echo "✓ API respondendo em https://api.kodify.com.br" \
            || (echo "✗ Health check falhou — verifique os logs da Lambda" && exit 1)
