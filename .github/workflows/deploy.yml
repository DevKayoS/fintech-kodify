name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Lambda
    runs-on: ubuntu-latest
    environment: production

    permissions:
      id-token: write   # necessário para OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test -race ./...

      - name: Build & zip API
        run: make zip-api

      - name: Build & zip Telegram bot
        run: make zip-telegram

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install Tern
        run: go install github.com/jackc/tern/v2@latest

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: make migrate-up

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/
        env:
          TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
        run: terraform apply -auto-approve

      - name: Deploy Lambda code (API)
        run: |
          aws lambda update-function-code \
            --function-name fintech-kodify-api \
            --zip-file fileb://lambda-api.zip \
            --region ${{ vars.AWS_REGION }} \
            --no-cli-pager

      - name: Deploy Lambda code (Telegram)
        run: |
          aws lambda update-function-code \
            --function-name fintech-kodify-telegram \
            --zip-file fileb://lambda-telegram.zip \
            --region ${{ vars.AWS_REGION }} \
            --no-cli-pager

      - name: Health check
        run: |
          sleep 10
          curl --fail --silent --show-error https://api.kodify.com.br/api/v1/health \
            && echo "✓ API respondendo em https://api.kodify.com.br" \
            || (echo "✗ Health check falhou — verifique os logs da Lambda" && exit 1)
